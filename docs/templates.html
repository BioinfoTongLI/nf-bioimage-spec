<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Template generator — nf-bioimage-spec</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,sans-serif;background:#f8fafc}
  .topbar{background:#fff;border-bottom:1.5px solid #e2e8f0;padding:10px 20px;font-size:13px;color:#64748b}
  .topbar a{color:#334155;text-decoration:none;font-weight:600}
  #app{max-width:960px;margin:0 auto;padding:16px}
  .cbtn{padding:5px 12px;border-radius:8px;font-size:12px;cursor:pointer;border:1.5px solid #cbd5e1;background:#fff;color:#334155;font-weight:500;margin:0 4px 8px 0}
  .cbtn.on{border:2px solid #1e293b;background:#1e293b;color:#fff;font-weight:700}
  .vbtn{padding:5px 12px;border-radius:8px;font-size:11px;cursor:pointer;border:1.5px solid #cbd5e1;background:#fff;color:#334155;font-weight:500;margin:0 4px 8px 0;text-align:left}
  .vbtn.on{border:2px solid #334155;background:#f0fdf4;font-weight:700}
  .name-box{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:12px}
  .name-box .row{display:flex;gap:12px;margin-bottom:2px}
  .name-box .lbl{font-weight:700;color:#64748b;min-width:60px}
  .name-box code{font-family:monospace;color:#0f172a}
  .tab{display:inline-block;padding:6px 14px;font-size:11px;cursor:pointer;font-family:monospace;border:1.5px solid #334155;border-radius:6px 6px 0 0;background:#e2e8f0;color:#334155;margin-right:2px}
  .tab.on{background:#0f172a;color:#e2e8f0;border-bottom:none;font-weight:700}
  .code-head{display:flex;justify-content:space-between;align-items:center;background:#1e293b;color:#94a3b8;padding:6px 12px;border-radius:8px 8px 0 0;font-size:11px}
  .copy-btn{background:none;border:1px solid #475569;border-radius:4px;color:#94a3b8;font-size:10px;padding:2px 8px;cursor:pointer}
  pre.code{background:#0f172a;color:#e2e8f0;padding:12px;border-radius:0 0 8px 8px;font-size:11px;line-height:1.6;overflow-x:auto;white-space:pre-wrap;word-break:break-word;margin:0}
  .hint{padding:30px;text-align:center;color:#94a3b8;font-size:14px}
  .loading{padding:40px;text-align:center;color:#64748b}
</style>
</head>
<body>
<div class="topbar"><a href="index.html">← nf-bioimage-spec</a> / Template generator</div>
<div id="app"><div class="loading">Loading schemas...</div></div>
<script>
(async function() {

// ── Load data from JSON files ──
var CATS, VARIANTS;
try {
  var r1 = await fetch("categories_data.json");
  CATS = await r1.json();
  var r2 = await fetch("variants_data.json");
  VARIANTS = await r2.json();
} catch(e) {
  document.getElementById("app").innerHTML = '<div class="hint">Error loading data: ' + e.message + '</div>';
  return;
}

// ── Abbreviation maps ──
var SA = {monolithic:"Mono",chunked:"Chnk"};
var OA = {image:"Img",mask:"Msk",vector:"Vec",tabular:"Tab",scalar:"Scl",skeleton:"Skl",swc:"SWC",track:"Trk","track+div":"TrkDiv",points:"Pts",classmask:"ClsMsk"};
var PA = {"external":"Ext","internal":"Int"};
var UA = {enduser:"EU",developer:"Dev"};
var CN = {ImgProc:"ImageProcessing",Stitch:"StitchingRegistration",ObjSeg:"ObjectSegmentation",PixCla:"PixelVoxelClassification",ObjDet:"SpotObjectDetection",SptCnt:"SpotObjectCounting",LndDet:"LandmarkDetection",TreTrc:"FilamentTreeTracing",LooTrc:"FilamentNetworkTracing",PrtTrk:"ParticleTracking",ObjTrk:"ObjectTracking",FeatExt:"FeatureExtraction",Raster:"Rasterisation",Seg2Vec:"SegmentationToVector"};
var OS = {image:"_processed.tif",mask:"_labels.tif",vector:"_labels.geojson",tabular:"_features.csv",scalar:"_counts.csv",skeleton:"_skeleton.tif",swc:"_trace.swc",track:"_tracks.csv","track+div":"_tracks/",points:"_detections.csv",classmask:"_landmarks.csv"};

function nm(cid,v) {
  var abbr = cid+"_"+SA[v.storage]+"_"+OA[v.output]+"_"+PA[v.parallelism]+"_"+UA[v.user_profile];
  var full = CN[cid]+"_"+(v.storage==="monolithic"?"Monolithic":"Chunked")+"_"+OA[v.output]+"_"+(v.parallelism==="external"?"External":"Internal")+"_"+(v.user_profile==="enduser"?"EndUser":"Developer");
  return {abbr:abbr, full:full, path:"templates/"+v.storage+"/"+v.user_profile+"/"+cid.toLowerCase()+"/", proc:abbr.toUpperCase()};
}

function esc(s) { return s.replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function genMain(cat,v,n) {
  var t = cat.id.toLowerCase();
  var lb = v.gpu==="optional"?"process_medium":v.gpu==="required"?"process_gpu":v.parallelism==="internal"?"process_high":"process_medium";
  var vc = v.ecosystem==="python" ? "python -m "+t+" --version 2>&1 | sed 's/.*//g'" : "fiji --headless --version";
  var inp = v.storage==="chunked" ? "zarr_dir" : "image";
  var modelLine = v.model==="model_input" ? "\n        --model ${model_weights} \\\\" : "";
  var suffix = OS[v.output] || "_out";
  return "// Full:  "+n.full+"\n// Abbr:  "+n.abbr+"\n\nprocess "+n.proc+" {\n    tag \"$meta.id\"\n    label '"+lb+"'\n\n    conda \"bioconda::"+t+"=1.0.0\"\n\n    input:\n    "+v.nf_input+"\n\n    output:\n    "+v.nf_output+"\n    tuple val(\"${task.process}\"), val('"+t+"'), eval('"+vc+"'), emit: versions_"+t+", topic: versions\n\n    when:\n    task.ext.when == null || task.ext.when\n\n    script:\n    def args = task.ext.args ?: ''\n    def prefix = task.ext.prefix ?: \"${meta.id}\"\n    \"\"\"\n    python -m "+t+" \\\\\n        --input ${"+inp+"} \\\\"+modelLine+"\n        --output ${prefix}"+suffix+" \\\\\n        $args\n    \"\"\"\n\n    stub:\n    def prefix = task.ext.prefix ?: \"${meta.id}\"\n    \"\"\"\n    touch ${prefix}"+suffix+"\n    \"\"\"\n}";
}

function genMeta(cat,v,n) {
  var t = cat.id.toLowerCase();
  var inpBlock = v.storage==="chunked" ? "  - zarr_dir: {type: directory, pattern: '*.zarr'}" : "  - image: {type: file, pattern: '*.{tif,tiff,png}'}";
  var modelBlock = v.model==="model_input" ? "\n  - model_weights: {type: file, pattern: '*.{pth,h5,onnx,pt}'}" : "";
  return "# "+n.full+"\nname: \""+n.abbr.toLowerCase()+"\"\ndescription: |\n  "+cat.task+"\nkeywords: [bioimage, "+t+", "+v.storage+", "+v.output+"]\ninput:\n  - meta: {type: map}\n"+inpBlock+modelBlock+"\ntopics:\n  versions:\n    - - \"${task.process}\": {type: string}\n      - \""+t+"\": {type: string}\n      - eval: {type: eval}";
}

function genTest(cat,v,n) {
  var dk = v.storage==="chunked" ? "zarr" : "image";
  var ml = v.model==="model_input" ? ",\n                    file(params.test_data['model'], checkIfExists:true)" : "";
  return "// "+n.abbr+"\nnextflow_process {\n    name \"Test "+n.proc+"\"\n    script \"../main.nf\"\n    process \""+n.proc+"\"\n\n    test(\""+cat.id+" "+v.storage+" "+v.user_profile+"\") {\n        when {\n            process {\n                \"\"\"\n                input[0] = [\n                    [id:'test', pixel_size_xy:0.65],\n                    file(params.test_data['"+dk+"'], checkIfExists:true)"+ml+"\n                ]\n                \"\"\"\n            }\n        }\n        then {\n            assertAll(\n                { assert process.success },\n                { assert snapshot(process.out).match() }\n            )\n        }\n    }\n}";
}

function genConf(cat,v,n) {
  var ps = (v.params||"").split(",").map(function(p){return "            // "+p.trim()}).join("\n");
  return "// "+n.abbr+"\nprocess {\n    withName: '"+n.proc+"' {\n        ext.args = [\n"+ps+"\n        ].join(' ')\n        publishDir = [\n            path: { \"${params.outdir}/"+cat.id.toLowerCase()+"\" },\n            mode: params.publish_dir_mode\n        ]\n    }\n}";
}

// ── State ──
var selCat = null, selVar = null, activeTab = "main.nf";
var catMap = {};
CATS.forEach(function(c) { catMap[c.id] = c; });
var catIds = [];
var seen = {};
VARIANTS.forEach(function(v) { if (!seen[v.category_id]) { seen[v.category_id]=1; catIds.push(v.category_id); }});

function render() {
  var app = document.getElementById("app");
  app.innerHTML = "";

  // Title
  var h2 = document.createElement("h2");
  h2.style.cssText = "font-size:20px;font-weight:700;margin:0 0 4px;color:#0f172a";
  h2.textContent = "nf-core Module Templates";
  app.appendChild(h2);

  var p = document.createElement("p");
  p.style.cssText = "font-size:13px;color:#475569;margin:0 0 14px";
  p.textContent = "Select category \u2192 variant \u2192 browse generated files";
  app.appendChild(p);

  // Category buttons
  var cd = document.createElement("div");
  catIds.forEach(function(id) {
    var b = document.createElement("button");
    b.className = "cbtn" + (selCat===id?" on":"");
    b.textContent = id;
    b.onclick = function() { selCat=id; selVar=null; render(); };
    cd.appendChild(b);
  });
  app.appendChild(cd);

  // Variant buttons
  var cat = catMap[selCat];
  if (cat) {
    var cvars = VARIANTS.filter(function(v){return v.category_id===selCat});
    var lbl = document.createElement("div");
    lbl.style.cssText = "font-size:12px;font-weight:600;color:#64748b;margin:12px 0 6px";
    lbl.textContent = cat.category + " \u2014 " + cvars.length + " variants:";
    app.appendChild(lbl);

    var vd = document.createElement("div");
    cvars.forEach(function(cv,i) {
      var b = document.createElement("button");
      b.className = "vbtn" + (selVar===i?" on":"");
      b.textContent = (cv.user_profile==="enduser"?"\uD83D\uDC64":"\uD83D\uDEE0") + " " + cv.storage + " \u2192 " + cv.output;
      b.onclick = function() { selVar=i; activeTab="main.nf"; render(); };
      vd.appendChild(b);
    });
    app.appendChild(vd);

    // Selected variant
    var v = cvars[selVar];
    if (v) {
      var n = nm(cat.id, v);

      // Name box
      var nb = document.createElement("div");
      nb.className = "name-box";
      nb.innerHTML = '<div class="row"><span class="lbl">Full:</span><code>'+esc(n.full)+'</code></div>'
        + '<div class="row"><span class="lbl">Abbr:</span><code style="font-weight:700">'+esc(n.abbr)+'</code></div>'
        + '<div class="row"><span class="lbl">Path:</span><code style="color:#475569">'+esc(n.path)+'</code></div>'
        + '<div class="row"><span class="lbl">Process:</span><code style="color:#475569">'+esc(n.proc)+'</code></div>';
      app.appendChild(nb);

      // Tabs
      var td = document.createElement("div");
      ["main.nf","meta.yml","test/main.nf.test","modules.config"].forEach(function(t) {
        var tb = document.createElement("span");
        tb.className = "tab" + (activeTab===t?" on":"");
        tb.textContent = t;
        tb.onclick = function() { activeTab=t; render(); };
        td.appendChild(tb);
      });
      app.appendChild(td);

      // Code
      var code = "";
      if (activeTab==="main.nf") code = genMain(cat,v,n);
      else if (activeTab==="meta.yml") code = genMeta(cat,v,n);
      else if (activeTab==="test/main.nf.test") code = genTest(cat,v,n);
      else code = genConf(cat,v,n);

      var ch = document.createElement("div");
      ch.className = "code-head";
      var sp = document.createElement("span");
      sp.textContent = activeTab;
      ch.appendChild(sp);
      var cp = document.createElement("button");
      cp.className = "copy-btn";
      cp.textContent = "Copy";
      cp.onclick = function() {
        navigator.clipboard.writeText(code);
        cp.textContent = "\u2713 Copied";
        setTimeout(function(){cp.textContent="Copy"},2000);
      };
      ch.appendChild(cp);
      app.appendChild(ch);

      var pre = document.createElement("pre");
      pre.className = "code";
      pre.textContent = code;
      app.appendChild(pre);
    } else {
      var h = document.createElement("div");
      h.className = "hint";
      h.textContent = "\u2191 Select a variant";
      app.appendChild(h);
    }
  } else {
    var h = document.createElement("div");
    h.className = "hint";
    h.textContent = "\u2191 Select a category";
    app.appendChild(h);
  }
}

render();
})();
</script>
</body>
</html>
