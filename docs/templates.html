d","output":"tabular","parallelism":"internal","user_profile":"enduser","gpu":"none","model":"none","ecosystem":"python","io_strategy":"read_only_new_file","dim_handling":"full_stack","nf_input":"tuple val(meta), path(zarr_dir)","nf_output":"tuple val(meta), path(\"*_features.csv\"), emit: features","params":"feature set name","qc":"Feature summary stats; correlation matrix","meta_fields":["id","pixel_size_xy","pixel_size_z","n_channels","channel_names"]},{"category_id":"Raster","storage":"monolithic","output":"mask","parallelism":"external","user_profile":"enduser","gpu":"none","model":"none","ecosystem":"python","io_strategy":"new_file","dim_handling":"single_plane","nf_input":"tuple val(meta), path(geojson), val(image_shape)","nf_output":"tuple val(meta), path(\"*_labels.tif\"), emit: labels","params":"\u2014","qc":"Label count; rasterised overlay PNG","meta_fields":["id","pixel_size_xy","image_width","image_height"]},{"category_id":"Raster","storage":"chunked","output":"mask","parallelism":"internal","user_profile":"enduser","gpu":"none","model":"none","ecosystem":"python","io_strategy":"new_zarr_symlink_labels","dim_handling":"single_plane","nf_input":"tuple val(meta), path(geojson), path(zarr_dir)","nf_output":"tuple val(meta), path(\"${meta.id}_raster.zarr\"), emit: labels","params":"\u2014","qc":"Label count","meta_fields":["id","pixel_size_xy"]},{"category_id":"Seg2Vec","storage":"monolithic","output":"vector","parallelism":"external","user_profile":"enduser","gpu":"none","model":"none","ecosystem":"python","io_strategy":"new_file","dim_handling":"single_plane","nf_input":"tuple val(meta), path(labels)","nf_output":"tuple val(meta), path(\"*_polygons.geojson\"), emit: polygons","params":"simplify tolerance","qc":"Polygon count; vertex count stats","meta_fields":["id","pixel_size_xy"]},{"category_id":"Seg2Vec","storage":"monolithic","output":"vector","parallelism":"external","user_profile":"developer","gpu":"none","model":"none","ecosystem":"python","io_strategy":"new_file","dim_handling":"single_plane","nf_input":"tuple val(meta), path(labels)","nf_output":"tuple val(meta), path(\"*_polygons.geojson\"), emit: polygons","params":"simplify tolerance, min area, hole handling, coord transform","qc":"Polygon count; vertex stats; param dump","meta_fields":["id","pixel_size_xy"]},{"category_id":"Seg2Vec","storage":"chunked","output":"vector","parallelism":"internal","user_profile":"enduser","gpu":"none","model":"none","ecosystem":"python","io_strategy":"read_only_new_file","dim_handling":"single_plane","nf_input":"tuple val(meta), path(zarr_dir)","nf_output":"tuple val(meta), path(\"*_polygons.geojson\"), emit: polygons","params":"simplify tolerance","qc":"Polygon count; vertex count stats","meta_fields":["id","pixel_size_xy"]}];

const SA={"monolithic":"Mono","chunked":"Chnk"};
const OA={"image":"Img","mask":"Msk","vector":"Vec","tabular":"Tab","scalar":"Scl","skeleton":"Skl","swc":"SWC","track":"Trk","track+div":"TrkDiv","points":"Pts","classmask":"ClsMsk"};
const PA={"external":"Ext","internal":"Int"};
const UA={"enduser":"EU","developer":"Dev"};
const CN={"ImgProc":"ImageProcessing","Stitch":"StitchingRegistration","ObjSeg":"ObjectSegmentation","PixCla":"PixelVoxelClassification","ObjDet":"SpotObjectDetection","SptCnt":"SpotObjectCounting","LndDet":"LandmarkDetection","TreTrc":"FilamentTreeTracing","LooTrc":"FilamentNetworkTracing","PrtTrk":"ParticleTracking","ObjTrk":"ObjectTracking","FeatExt":"FeatureExtraction","Raster":"Rasterisation","Seg2Vec":"SegmentationToVector"};
const OS={"image":"_processed.tif","mask":"_labels.tif","vector":"_labels.geojson","tabular":"_features.csv","scalar":"_counts.csv","skeleton":"_skeleton.tif","swc":"_trace.swc","track":"_tracks.csv","track+div":"_tracks/","points":"_detections.csv","classmask":"_landmarks.csv"};

function names(cid,v){
  const abbr=`${cid}_${SA[v.storage]}_${OA[v.output]}_${PA[v.parallelism]}_${UA[v.user_profile]}`;
  const full=`${CN[cid]}_${v.storage==="monolithic"?"Monolithic":"Chunked"}_${OA[v.output]}_${v.parallelism==="external"?"External":"Internal"}_${v.user_profile==="enduser"?"EndUser":"Developer"}`;
  return{abbr,full,path:`templates/${v.storage}/${v.user_profile}/${cid.toLowerCase()}/`,proc:abbr.toUpperCase()};
}

function genMain(cat,v,n){
  const t=cat.id.toLowerCase();
  const lb=v.gpu==="optional"?"process_medium":v.gpu==="required"?"process_gpu":v.parallelism==="internal"?"process_high":"process_medium";
  const vc=v.ecosystem==="python"?`python -m ${t} --version 2>&1 | sed 's/.*//g'`:`fiji --headless --version`;
  return `// Full:  ${n.full}\n// Abbr:  ${n.abbr}\n\nprocess ${n.proc} {\n    tag "$meta.id"\n    label '${lb}'\n\n    conda "bioconda::${t}=1.0.0"\n\n    input:\n    ${v.nf_input}\n\n    output:\n    ${v.nf_output}\n    tuple val("\${task.process}"), val('${t}'), eval('${vc}'), emit: versions_${t}, topic: versions\n\n    when:\n    task.ext.when == null || task.ext.when\n\n    script:\n    def args = task.ext.args ?: ''\n    def prefix = task.ext.prefix ?: "\${meta.id}"\n    """\n    python -m ${t} \\\\\n        --input \${${v.storage==="chunked"?"zarr_dir":"image"}} \\\\${v.model==="model_input"?"\n        --model \${model_weights} \\\\":""}\n        --output \${prefix}${OS[v.output]||"_out"} \\\\\n        $args\n    """\n\n    stub:\n    def prefix = task.ext.prefix ?: "\${meta.id}"\n    """\n    touch \${prefix}${OS[v.output]||"_out"}\n    """\n}`;
}

function genMeta(cat,v,n){
  const t=cat.id.toLowerCase();
  return `# ${n.full}\nname: "${n.abbr.toLowerCase()}"\ndescription: |\n  ${cat.task}\nkeywords: [bioimage, ${t}, ${v.storage}, ${v.output}]\ninput:\n  - meta: {type: map}\n${v.storage==="chunked"?"  - zarr_dir: {type: directory, pattern: '*.zarr'}":"  - image: {type: file, pattern: '*.{tif,tiff,png}'}"}${v.model==="model_input"?"\n  - model_weights: {type: file, pattern: '*.{pth,h5,onnx,pt}'}":""}\ntopics:\n  versions:\n    - - "\${task.process}": {type: string}\n      - "${t}": {type: string}\n      - eval: {type: eval}`;
}

function genTest(cat,v,n){
  return `// ${n.abbr}\nnextflow_process {\n    name "Test ${n.proc}"\n    script "../main.nf"\n    process "${n.proc}"\n\n    test("${cat.id} ${v.storage} ${v.user_profile}") {\n        when {\n            process {\n                """\n                input[0] = [\n                    [id:'test', pixel_size_xy:0.65],\n                    file(params.test_data['${v.storage==="chunked"?"zarr":"image"}'], checkIfExists:true)${v.model==="model_input"?",\n                    file(params.test_data['model'], checkIfExists:true)":""}\n                ]\n                """\n            }\n        }\n        then {\n            assertAll(\n                { assert process.success },\n                { assert snapshot(process.out).match() }\n            )\n        }\n    }\n}`;
}

function genConf(cat,v,n){
  const ps=(v.params||"").split(",").map(p=>`            // ${p.trim()}`).join("\n");
  return `// ${n.abbr}\nprocess {\n    withName: '${n.proc}' {\n        ext.args = [\n${ps}\n        ].join(' ')\n        publishDir = [\n            path: { "\${params.outdir}/${cat.id.toLowerCase()}" },\n            mode: params.publish_dir_mode\n        ]\n    }\n}`;
}

let st = { selCat: null, selVar: null, tab: "main.nf" };
const catMap = Object.fromEntries(CATS.map(c=>[c.id,c]));
const catIds = [...new Set(VARIANTS.map(v=>v.category_id))];

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  const{selCat,selVar,tab}=st;
  const cat=catMap[selCat];
  const cvars=VARIANTS.filter(v=>v.category_id===selCat);
  const v=cvars[selVar];
  const n=cat&&v?names(cat.id,v):null;

  app.innerHTML+=`<h2 style="font-size:20px;font-weight:700;margin:0 0 4px">nf-core Module Templates</h2>`;
  app.innerHTML+=`<p style="font-size:13px;color:#475569;margin:0 0 14px">Select category → variant → browse files</p>`;

  const cb=document.createElement("div");cb.className="cat-btns";
  catIds.forEach(id=>{
    const b=document.createElement("button");b.className=`cbtn${selCat===id?" on":""}`;b.textContent=id;
    b.onclick=()=>{st.selCat=id;st.selVar=null;render()};cb.appendChild(b);
  });
  app.appendChild(cb);

  if(cat){
    const vl=document.createElement("div");vl.style.cssText="font-size:12px;font-weight:600;color:#64748b;margin-bottom:6px";
    vl.textContent=`${cat.category} — ${cvars.length} variants:`;app.appendChild(vl);
    const vb=document.createElement("div");vb.className="var-btns";
    cvars.forEach((cv,i)=>{
      const b=document.createElement("button");b.className=`vbtn${selVar===i?" on":""}`;
      b.innerHTML=`${cv.user_profile==="enduser"?"👤":"🛠"} ${cv.storage} → ${cv.output}`;
      b.onclick=()=>{st.selVar=i;st.tab="main.nf";render()};vb.appendChild(b);
    });
    app.appendChild(vb);
  }

  if(n){
    const nb=document.createElement("div");nb.className="name-box";
    nb.innerHTML=`<div class="name-grid"><span class="lbl">Full:</span><code>${n.full}</code><span class="lbl">Abbr:</span><code style="font-weight:700">${n.abbr}</code><span class="lbl">Path:</span><code style="font-size:11px;color:#475569">${n.path}</code><span class="lbl">Process:</span><code style="font-size:11px;color:#475569">${n.proc}</code></div>`;
    app.appendChild(nb);

    const tabs=document.createElement("div");tabs.className="tabs";
    ["main.nf","meta.yml","test/main.nf.test","modules.config"].forEach(t=>{
      const b=document.createElement("button");b.className=tab===t?"on":"";b.textContent=t;
      b.onclick=()=>{st.tab=t;render()};tabs.appendChild(b);
    });
    app.appendChild(tabs);

    let code="";
    if(tab==="main.nf")code=genMain(cat,v,n);
    else if(tab==="meta.yml")code=genMeta(cat,v,n);
    else if(tab==="test/main.nf.test")code=genTest(cat,v,n);
    else code=genConf(cat,v,n);

    const ch=document.createElement("div");ch.className="code-head";
    ch.innerHTML=`<span>${tab}</span>`;
    const cp=document.createElement("button");cp.className="copy-btn";cp.textContent="Copy";
    cp.onclick=()=>{navigator.clipboard.writeText(code);cp.textContent="✓ Copied";setTimeout(()=>{cp.textContent="Copy"},2000)};
    ch.appendChild(cp);app.appendChild(ch);

    const pre=document.createElement("pre");pre.textContent=code;app.appendChild(pre);
  }

  if(!selCat) app.innerHTML+=`<div class="hint">↑ Select a category</div>`;
  else if(selVar===null) app.innerHTML+=`<div class="hint">↑ Select a variant</div>`;
}
render();
</script>
