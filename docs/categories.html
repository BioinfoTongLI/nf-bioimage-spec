  *{box-sizing:border-box;margin:0;padding:0}

  .src-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;color:#fff}
  .cat-name{font-weight:700;font-size:15px;color:#0f172a}
  .cat-id{font-size:12px;color:#64748b;font-family:monospace}
  .cat-task{font-size:13px;color:#334155;margin-top:4px}

  .nf-box{border-radius:6px;padding:8px 10px}
  .nf-h{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}

  .field-val{font-size:12px;color:#1e293b;line-height:1.5}

  .expand-area{padding:0 16px 16px}

zarr unchanged, writes new file. Idempotent.","note":""}]},{"id":"Raster","category":"Rasterisation","task":"Convert vector annotations to raster label masks","source":"custom","variants":[{"storage":"monolithic","output":"mask","parallelism":"external","userProfile":"enduser","gpu":"none","model":"none","ecosystem":"python","ioStrategy":"new_file","dimHandling":"single_plane","nfInput":"tuple val(meta), path(geojson), val(image_shape)","nfOutput":"tuple val(meta), path(\"*_labels.tif\"), emit: labels","params":"\u2014","qc":"Label count; rasterised overlay PNG","metaFields":["id","pixel_size_xy","image_width","image_height"],"ioNote":"New output file. Fully idempotent, -resume safe.","note":""},{"storage":"chunked","output":"mask","parallelism":"internal","userProfile":"enduser","gpu":"none","model":"none","ecosystem":"python","ioStrategy":"new_zarr_symlink_labels","dimHandling":"single_plane","nfInput":"tuple val(meta), path(geojson), path(zarr_dir)","nfOutput":"tuple val(meta), path(\"${meta.id}_raster.zarr\"), emit: labels","params":"\u2014","qc":"Label count","metaFields":["id","pixel_size_xy"],"ioNote":"New zarr: symlinks to input + new labels/ group. Input unmodified.","note":""}]},{"id":"Seg2Vec","category":"Segmentation to Vector","task":"Convert segmentation masks to vector format","source":"custom","variants":[{"storage":"monolithic","output":"vector","parallelism":"external","userProfile":"enduser","gpu":"none","model":"none","ecosystem":"python","ioStrategy":"new_file","dimHandling":"single_plane","nfInput":"tuple val(meta), path(labels)","nfOutput":"tuple val(meta), path(\"*_polygons.geojson\"), emit: polygons","params":"simplify tolerance","qc":"Polygon count; vertex count stats","metaFields":["id","pixel_size_xy"],"ioNote":"New output file. Fully idempotent, -resume safe.","note":""},{"storage":"monolithic","output":"vector","parallelism":"external","userProfile":"developer","gpu":"none","model":"none","ecosystem":"python","ioStrategy":"new_file","dimHandling":"single_plane","nfInput":"tuple val(meta), path(labels)","nfOutput":"tuple val(meta), path(\"*_polygons.geojson\"), emit: polygons","params":"simplify tolerance, min area, hole handling, coord transform","qc":"Polygon count; vertex stats; param dump","metaFields":["id","pixel_size_xy"],"ioNote":"New output file. Fully idempotent, -resume safe.","note":""},{"storage":"chunked","output":"vector","parallelism":"internal","userProfile":"enduser","gpu":"none","model":"none","ecosystem":"python","ioStrategy":"read_only_new_file","dimHandling":"single_plane","nfInput":"tuple val(meta), path(zarr_dir)","nfOutput":"tuple val(meta), path(\"*_polygons.geojson\"), emit: polygons","params":"simplify tolerance","qc":"Polygon count; vertex count stats","metaFields":["id","pixel_size_xy"],"ioNote":"Reads zarr unchanged, writes new file. Idempotent.","note":""}]}];

const SRC={"custom":{bg:"#eef2ff",border:"#a5b4fc",badge:"#4f46e5",label:"Custom"},"BIAFLOWS":{bg:"#ecfdf5",border:"#6ee7b7",badge:"#059669",label:"BIAFLOWS"}};
const STOR={"monolithic":{color:"#b91c1c",bg:"#fef2f2",border:"#fca5a5",label:"Monolithic"},"chunked":{color:"#047857",bg:"#ecfdf5",border:"#6ee7b7",label:"Chunked"}};
const PAR={"external":{color:"#1d4ed8",bg:"#eff6ff",label:"External (NF)",icon:"⇉"},"internal":{color:"#c2410c",bg:"#fff7ed",label:"Internal",icon:"⟳"}};
const OUT={"image":"🖼 Image","mask":"🏷 Mask","vector":"📐 Vector","tabular":"📊 Table","scalar":"# Scalar","skeleton":"🦴 Skeleton","swc":"🌳 SWC","track":"〰 Tracks","track+div":"〰÷ Tracks+Div","points":"· Points","classmask":"◎ ClassMask"};
const GPU={"none":{label:"CPU only",color:"#475569",bg:"#f1f5f9"},"optional":{label:"GPU optional",color:"#b45309",bg:"#fffbeb"},"required":{label:"GPU required",color:"#dc2626",bg:"#fef2f2"}};
const MDL={"none":{label:"No model",color:"#475569",bg:"#f1f5f9"},"model_bundled":{label:"Model in container",color:"#7c3aed",bg:"#f5f3ff"},"model_input":{label:"Model as input",color:"#0369a1",bg:"#f0f9ff"}};
const ECO={"python":{label:"Python",color:"#2563eb",bg:"#eff6ff"},"java_fiji":{label:"Java/Fiji",color:"#b45309",bg:"#fffbeb"}};
const IOS={"new_file":{label:"New file",color:"#166534",bg:"#f0fdf4",icon:"📄"},"read_only_new_file":{label:"Read-only zarr → new file",color:"#166534",bg:"#f0fdf4",icon:"📄"},"new_group_same_zarr":{label:"New group in same zarr",color:"#b45309",bg:"#fffbeb",icon:"📁+"},"new_zarr_symlink_labels":{label:"New zarr (symlinks+labels/)",color:"#7c3aed",bg:"#f5f3ff",icon:"🔗🏷"},"new_zarr_symlink_meta":{label:"New zarr (symlinks+meta)",color:"#0369a1",bg:"#f0f9ff",icon:"🔗📋"}};
const UP={"enduser":{label:"👤 End-user",color:"#0d9488",bg:"#f0fdfa",border:"#99f6e4"},"developer":{label:"🛠 Developer",color:"#7c3aed",bg:"#f5f3ff",border:"#c4b5fd"}};
const DIM={"single_plane":"Single 2D plane","per_channel_slice":"Per channel/slice","full_volume":"Full 3D volume","full_stack":"Full TCZYX stack","full_timelapse":"Full time-lapse","multi_tile":"Multi-tile / multi-FOV"};

let state = { expanded: null, filterSrc: "all", filterProfile: "all" };

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === "style" && typeof v === "object") Object.assign(el.style, v);
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  });
  children.flat(Infinity).forEach(c => {
    if (c == null) return;
    el.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return el;
}

function badge(label, color, bg) {
  return h("span", { class: "badge", style: { background: bg, color, border: `1px solid ${color}` } }, label);
}

function field(label, content, wide) {
  return h("div", { class: wide ? "field wide" : "field" },
    h("div", { class: "field-label" }, label),
    h("div", { class: "field-val" }, content));
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  const { expanded, filterSrc, filterProfile } = state;
  const filtered = DATA.filter(c => filterSrc === "all" || c.source === filterSrc)
    .map(c => ({ ...c, variants: filterProfile === "all" ? c.variants : c.variants.filter(v => v.userProfile === filterProfile) }))
    .filter(c => c.variants.length > 0);
  const total = DATA.reduce((s, c) => s + c.variants.length, 0);

  app.appendChild(h("h2", { style: { fontSize: "20px", fontWeight: 700, margin: "0 0 2px", color: "#0f172a" } }, "Image Analysis Module Types"));
  app.appendChild(h("p", { style: { fontSize: "13px", color: "#475569", margin: "0 0 4px" } }, `${DATA.length} categories → ${total} module variants`));
  app.appendChild(h("p", { style: { fontSize: "12px", color: "#64748b", margin: "0 0 14px" } }, "Axes: Storage × Output × Parallelism × User profile"));

  // Filters
  const filters = h("div", { class: "filters" });
  const srcGroup = h("div", { class: "fg" }, h("span", null, "Source:"));
  [["all","All"],["custom","Custom"],["BIAFLOWS","BIAFLOWS"]].forEach(([k,l]) => {
    const b = h("button", { class: `fbtn${filterSrc===k?" on":""}`, onClick: () => { state.filterSrc = k; render(); } }, l);
    srcGroup.appendChild(b);
  });
  filters.appendChild(srcGroup);
  const profGroup = h("div", { class: "fg" }, h("span", null, "Profile:"));
  [["all","All"],["enduser","👤 End-user"],["developer","🛠 Developer"]].forEach(([k,l]) => {
    const b = h("button", { class: `fbtn${filterProfile===k?" on":""}`, onClick: () => { state.filterProfile = k; render(); } }, l);
    profGroup.appendChild(b);
  });
  filters.appendChild(profGroup);
  app.appendChild(filters);

  // Cards
  filtered.forEach(cat => {
    const src = SRC[cat.source];
    const isOpen = expanded === cat.id;
    const card = h("div", { class: "cat-card", style: { background: src.bg, border: `1.5px solid ${src.border}` } });
    const head = h("div", { class: "cat-head", onClick: () => { state.expanded = isOpen ? null : cat.id; render(); } });
    const title = h("div", { class: "cat-title" },
      h("span", { class: "src-badge", style: { background: src.badge } }, src.label),
      h("span", { class: "cat-name" }, cat.category),
      h("span", { class: "cat-id" }, cat.id),
      h("span", { style: { marginLeft: "auto", fontSize: "12px", color: "#475569", fontWeight: 600 } }, `${cat.variants.length} variant${cat.variants.length>1?"s":""} ${isOpen?"▲":"▼"}`));
    head.appendChild(title);
    head.appendChild(h("div", { class: "cat-task" }, cat.task));
    const pills = h("div", { class: "pills" });
    cat.variants.forEach(v => {
      const st = STOR[v.storage]; const pl = PAR[v.parallelism]; const up = UP[v.userProfile];
      pills.appendChild(h("span", { class: "pill", style: { border: `1px solid ${st.border}` } },
        h("span", { style: { color: up.color, fontWeight: 700 } }, up.label.slice(0, 2)),
        h("span", { style: { color: st.color, fontWeight: 700 } }, st.label),
        h("span", { style: { color: "#94a3b8" } }, "→"),
        h("span", null, OUT[v.output] || v.output),
        h("span", { style: { color: pl.color, fontWeight: 700 } }, pl.icon)));
    });
    head.appendChild(pills);
    card.appendChild(head);

    if (isOpen) {
      const area = h("div", { class: "expand-area" });
      cat.variants.forEach((v, vi) => {
        const st = STOR[v.storage]; const pl = PAR[v.parallelism]; const gp = GPU[v.gpu]; const ml = MDL[v.model]; const ec = ECO[v.ecosystem]; const io = IOS[v.ioStrategy]; const up = UP[v.userProfile];
        const vc = h("div", { class: "var-card", style: { border: `1.5px solid ${up.border}`, borderLeft: `5px solid ${up.color}` } });
        vc.appendChild(h("div", { class: "up-banner", style: { background: up.bg, border: `1px solid ${up.border}` } },
          h("span", { style: { fontSize: "13px", fontWeight: 700, color: up.color } }, up.label)));
        vc.appendChild(h("div", { class: "var-badges" },
          h("span", { style: { fontSize: "13px", fontWeight: 700, color: st.color } }, st.label),
          h("span", { style: { color: "#94a3b8", fontWeight: 700 } }, "→"),
          h("span", { style: { fontSize: "13px", fontWeight: 600, color: "#334155" } }, OUT[v.output] || v.output),
          badge(`${pl.icon} ${pl.label}`, pl.color, pl.bg),
          badge(gp.label, gp.color, gp.bg),
          badge(ml.label, ml.color, ml.bg),
          badge(ec.label, ec.color, ec.bg)));
        vc.appendChild(h("div", { class: "io-card", style: { background: io.bg, border: `1.5px solid ${io.color}` } },
          h("div", { class: "io-label", style: { color: io.color } }, `${io.icon} I/O: ${io.label}`),
          h("div", { style: { fontSize: "11px", color: "#334155", lineHeight: "1.5" } }, v.ioNote)));
        const nfGrid = h("div", { class: "nf-grid" },
          h("div", { class: "nf-box", style: { background: "#f0fdf4", border: "1px solid #bbf7d0" } },
            h("div", { class: "nf-h", style: { color: "#166534" } }, "NF Input"),
            h("code", { class: "nf-code", style: { color: "#14532d" } }, v.nfInput)),
          h("div", { class: "nf-box", style: { background: "#fefce8", border: "1px solid #fde68a" } },
            h("div", { class: "nf-h", style: { color: "#854d0e" } }, "NF Output"),
            h("code", { class: "nf-code", style: { color: "#713f12" } }, v.nfOutput)));
        vc.appendChild(nfGrid);
        const dg = h("div", { class: "detail-grid" },
          field("Dimensionality", DIM[v.dimHandling] || v.dimHandling),
          field("Params", v.params),
          field("QC outputs", v.qc),
          field("Meta fields", h("code", { style: { fontSize: "11px", fontFamily: "monospace" } }, `[${v.metaFields.map(f => `"${f}"`).join(", ")}]`), true));
        vc.appendChild(dg);
        vc.appendChild(h("div", { class: "note" }, v.note));
        area.appendChild(vc);
      });
      card.appendChild(area);
    }
    app.appendChild(card);
  });
}
render();
</script>
