# Full name:    SpotObjectCounting_Chunked_Scalar_Internal_EndUser
# Abbreviation: SptCnt_Chnk_Scl_Int_EU

name: "sptcnt_chnk_scl_int_eu"
description: |
  Estimate the number of objects
  Storage: chunked | User profile: enduser
keywords:
  - bioimage
  - sptcnt
  - chunked
  - scalar
tools:
  - "sptcnt":
      description: "Estimate the number of objects"
      homepage: "https://github.com/example/sptcnt"
      documentation: "https://github.com/example/sptcnt/docs"
      licence: ["MIT"]
input:
  - meta:
      type: map
      description: |
        Groovy map containing sample metadata.
        e.g. [id: 'sample1', pixel_size_xy: 0.65, pixel_size_z: 2.0]
  - zarr_dir:
      type: directory
      description: Path to OME-Zarr directory
      pattern: "*.zarr"
output:
  - meta:
      type: map
      description: Groovy map containing sample metadata
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "sptcnt":
          type: string
          description: The name of the tool
      - "python -m sptcnt --version 2>&1 | sed 's/.*//g'":
          type: eval
          description: The command used to obtain the version of the tool
