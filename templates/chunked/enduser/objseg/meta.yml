# Full name:    ObjectSegmentation_Chunked_LabelMask_Internal_EndUser
# Abbreviation: ObjSeg_Chnk_Msk_Int_EU

name: "objseg_chnk_msk_int_eu"
description: |
  Delineate individual objects as distinct labelled regions
  Storage: chunked | User profile: enduser
keywords:
  - bioimage
  - objseg
  - chunked
  - mask
tools:
  - "objseg":
      description: "Delineate individual objects as distinct labelled regions"
      homepage: "https://github.com/example/objseg"
      documentation: "https://github.com/example/objseg/docs"
      licence: ["MIT"]
input:
  - meta:
      type: map
      description: |
        Groovy map containing sample metadata.
        e.g. [id: 'sample1', pixel_size_xy: 0.65, pixel_size_z: 2.0]
  - zarr_dir:
      type: directory
      description: Path to OME-Zarr directory
      pattern: "*.zarr"
output:
  - meta:
      type: map
      description: Groovy map containing sample metadata
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "objseg":
          type: string
          description: The name of the tool
      - "python -m objseg --version 2>&1 | sed 's/.*//g'":
          type: eval
          description: The command used to obtain the version of the tool
