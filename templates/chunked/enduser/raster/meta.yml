# Full name:    Rasterisation_Chunked_LabelMask_Internal_EndUser
# Abbreviation: Raster_Chnk_Msk_Int_EU

name: "raster_chnk_msk_int_eu"
description: |
  Convert vector annotations to raster label masks
  Storage: chunked | User profile: enduser
keywords:
  - bioimage
  - raster
  - chunked
  - mask
tools:
  - "raster":
      description: "Convert vector annotations to raster label masks"
      homepage: "https://github.com/example/raster"
      documentation: "https://github.com/example/raster/docs"
      licence: ["MIT"]
input:
  - meta:
      type: map
      description: |
        Groovy map containing sample metadata.
        e.g. [id: 'sample1', pixel_size_xy: 0.65, pixel_size_z: 2.0]
  - zarr_dir:
      type: directory
      description: Path to OME-Zarr directory
      pattern: "*.zarr"
output:
  - meta:
      type: map
      description: Groovy map containing sample metadata
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "raster":
          type: string
          description: The name of the tool
      - "python -m raster --version 2>&1 | sed 's/.*//g'":
          type: eval
          description: The command used to obtain the version of the tool
