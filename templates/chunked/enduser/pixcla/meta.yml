# Full name:    PixelVoxelClassification_Chunked_LabelMask_Internal_EndUser
# Abbreviation: PixCla_Chnk_Msk_Int_EU

name: "pixcla_chnk_msk_int_eu"
description: |
  Assign each pixel to a semantic class
  Storage: chunked | User profile: enduser
keywords:
  - bioimage
  - pixcla
  - chunked
  - mask
tools:
  - "pixcla":
      description: "Assign each pixel to a semantic class"
      homepage: "https://github.com/example/pixcla"
      documentation: "https://github.com/example/pixcla/docs"
      licence: ["MIT"]
input:
  - meta:
      type: map
      description: |
        Groovy map containing sample metadata.
        e.g. [id: 'sample1', pixel_size_xy: 0.65, pixel_size_z: 2.0]
  - zarr_dir:
      type: directory
      description: Path to OME-Zarr directory
      pattern: "*.zarr"
output:
  - meta:
      type: map
      description: Groovy map containing sample metadata
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "pixcla":
          type: string
          description: The name of the tool
      - "python -m pixcla --version 2>&1 | sed 's/.*//g'":
          type: eval
          description: The command used to obtain the version of the tool
