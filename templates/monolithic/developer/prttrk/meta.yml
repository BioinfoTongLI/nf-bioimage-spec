# Full name:    ParticleTracking_Monolithic_Tracks_Internal_Developer
# Abbreviation: PrtTrk_Mono_Trk_Int_Dev

name: "prttrk_mono_trk_int_dev"
description: |
  Estimate tracks followed by particles (no division)
  Storage: monolithic | User profile: developer
keywords:
  - bioimage
  - prttrk
  - monolithic
  - track
tools:
  - "prttrk":
      description: "Estimate tracks followed by particles (no division)"
      homepage: "https://github.com/example/prttrk"
      documentation: "https://github.com/example/prttrk/docs"
      licence: ["MIT"]
input:
  - meta:
      type: map
      description: |
        Groovy map containing sample metadata.
        e.g. [id: 'sample1', pixel_size_xy: 0.65, pixel_size_z: 2.0]
  - image:
      type: file
      description: Input image file
      pattern: "*.{tif,tiff,png}"
output:
  - meta:
      type: map
      description: Groovy map containing sample metadata
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "prttrk":
          type: string
          description: The name of the tool
      - "fiji --headless --eval 'println(System.getProperty("fiji.version"))' 2>&1 | tail -1":
          type: eval
          description: The command used to obtain the version of the tool
