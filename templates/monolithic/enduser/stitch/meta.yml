# Full name:    StitchingRegistration_Monolithic_Image_Internal_EndUser
# Abbreviation: Stitch_Mono_Img_Int_EU

name: "stitch_mono_img_int_eu"
description: |
  Align and merge tiles or time-points into a single coordinate space
  Storage: monolithic | User profile: enduser
keywords:
  - bioimage
  - stitch
  - monolithic
  - image
tools:
  - "stitch":
      description: "Align and merge tiles or time-points into a single coordinate space"
      homepage: "https://github.com/example/stitch"
      documentation: "https://github.com/example/stitch/docs"
      licence: ["MIT"]
input:
  - meta:
      type: map
      description: |
        Groovy map containing sample metadata.
        e.g. [id: 'sample1', pixel_size_xy: 0.65, pixel_size_z: 2.0]
  - image:
      type: file
      description: Input image file
      pattern: "*.{tif,tiff,png}"
output:
  - meta:
      type: map
      description: Groovy map containing sample metadata
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "stitch":
          type: string
          description: The name of the tool
      - "fiji --headless --eval 'println(System.getProperty("fiji.version"))' 2>&1 | tail -1":
          type: eval
          description: The command used to obtain the version of the tool
