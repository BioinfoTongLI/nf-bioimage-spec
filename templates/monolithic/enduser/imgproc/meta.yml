# Full name:    ImageProcessing_Monolithic_Image_External_EndUser
# Abbreviation: ImgProc_Mono_Img_Ext_EU

name: "imgproc_mono_img_ext_eu"
description: |
  Denoising, deconvolution, flat-field correction, filtering
  Storage: monolithic | User profile: enduser
keywords:
  - bioimage
  - imgproc
  - monolithic
  - image
tools:
  - "imgproc":
      description: "Denoising, deconvolution, flat-field correction, filtering"
      homepage: "https://github.com/example/imgproc"
      documentation: "https://github.com/example/imgproc/docs"
      licence: ["MIT"]
input:
  - meta:
      type: map
      description: |
        Groovy map containing sample metadata.
        e.g. [id: 'sample1', pixel_size_xy: 0.65, pixel_size_z: 2.0]
  - image:
      type: file
      description: Input image file
      pattern: "*.{tif,tiff,png}"
output:
  - meta:
      type: map
      description: Groovy map containing sample metadata
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "imgproc":
          type: string
          description: The name of the tool
      - "python -m imgproc --version 2>&1 | sed 's/.*//g'":
          type: eval
          description: The command used to obtain the version of the tool
