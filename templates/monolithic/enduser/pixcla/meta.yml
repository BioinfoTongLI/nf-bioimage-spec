# Full name:    PixelVoxelClassification_Monolithic_LabelMask_External_EndUser
# Abbreviation: PixCla_Mono_Msk_Ext_EU

name: "pixcla_mono_msk_ext_eu"
description: |
  Assign each pixel to a semantic class
  Storage: monolithic | User profile: enduser
keywords:
  - bioimage
  - pixcla
  - monolithic
  - mask
tools:
  - "pixcla":
      description: "Assign each pixel to a semantic class"
      homepage: "https://github.com/example/pixcla"
      documentation: "https://github.com/example/pixcla/docs"
      licence: ["MIT"]
input:
  - meta:
      type: map
      description: |
        Groovy map containing sample metadata.
        e.g. [id: 'sample1', pixel_size_xy: 0.65, pixel_size_z: 2.0]
  - image:
      type: file
      description: Input image file
      pattern: "*.{tif,tiff,png}"
output:
  - meta:
      type: map
      description: Groovy map containing sample metadata
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "pixcla":
          type: string
          description: The name of the tool
      - "python -m pixcla --version 2>&1 | sed 's/.*//g'":
          type: eval
          description: The command used to obtain the version of the tool
