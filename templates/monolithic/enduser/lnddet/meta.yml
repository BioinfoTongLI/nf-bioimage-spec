# Full name:    LandmarkDetection_Monolithic_ClassMask_External_EndUser
# Abbreviation: LndDet_Mono_ClsMsk_Ext_EU

name: "lnddet_mono_clsmsk_ext_eu"
description: |
  Estimate position of specific feature points
  Storage: monolithic | User profile: enduser
keywords:
  - bioimage
  - lnddet
  - monolithic
  - classmask
tools:
  - "lnddet":
      description: "Estimate position of specific feature points"
      homepage: "https://github.com/example/lnddet"
      documentation: "https://github.com/example/lnddet/docs"
      licence: ["MIT"]
input:
  - meta:
      type: map
      description: |
        Groovy map containing sample metadata.
        e.g. [id: 'sample1', pixel_size_xy: 0.65, pixel_size_z: 2.0]
  - image:
      type: file
      description: Input image file
      pattern: "*.{tif,tiff,png}"
output:
  - meta:
      type: map
      description: Groovy map containing sample metadata
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "lnddet":
          type: string
          description: The name of the tool
      - "python -m lnddet --version 2>&1 | sed 's/.*//g'":
          type: eval
          description: The command used to obtain the version of the tool
