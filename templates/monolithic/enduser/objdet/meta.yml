# Full name:    SpotObjectDetection_Monolithic_Points_External_EndUser
# Abbreviation: ObjDet_Mono_Pts_Ext_EU

name: "objdet_mono_pts_ext_eu"
description: |
  Detect and localise objects (e.g. nuclei, spots)
  Storage: monolithic | User profile: enduser
keywords:
  - bioimage
  - objdet
  - monolithic
  - points
tools:
  - "objdet":
      description: "Detect and localise objects (e.g. nuclei, spots)"
      homepage: "https://github.com/example/objdet"
      documentation: "https://github.com/example/objdet/docs"
      licence: ["MIT"]
input:
  - meta:
      type: map
      description: |
        Groovy map containing sample metadata.
        e.g. [id: 'sample1', pixel_size_xy: 0.65, pixel_size_z: 2.0]
  - image:
      type: file
      description: Input image file
      pattern: "*.{tif,tiff,png}"
output:
  - meta:
      type: map
      description: Groovy map containing sample metadata
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "objdet":
          type: string
          description: The name of the tool
      - "python -m objdet --version 2>&1 | sed 's/.*//g'":
          type: eval
          description: The command used to obtain the version of the tool
