# Full name:    FilamentNetworkTracing_Monolithic_SkeletonMask_Internal_EndUser
# Abbreviation: LooTrc_Mono_Skl_Int_EU

name: "lootrc_mono_skl_int_eu"
description: |
  Estimate medial axis of filament networks (with loops)
  Storage: monolithic | User profile: enduser
keywords:
  - bioimage
  - lootrc
  - monolithic
  - skeleton
tools:
  - "lootrc":
      description: "Estimate medial axis of filament networks (with loops)"
      homepage: "https://github.com/example/lootrc"
      documentation: "https://github.com/example/lootrc/docs"
      licence: ["MIT"]
input:
  - meta:
      type: map
      description: |
        Groovy map containing sample metadata.
        e.g. [id: 'sample1', pixel_size_xy: 0.65, pixel_size_z: 2.0]
  - image:
      type: file
      description: Input image file
      pattern: "*.{tif,tiff,png}"
output:
  - meta:
      type: map
      description: Groovy map containing sample metadata
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "lootrc":
          type: string
          description: The name of the tool
      - "fiji --headless --eval 'println(System.getProperty("fiji.version"))' 2>&1 | tail -1":
          type: eval
          description: The command used to obtain the version of the tool
